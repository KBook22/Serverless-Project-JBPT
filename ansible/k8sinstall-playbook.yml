---
# ============================================================================
# Kubernetes v1.31 Cluster Installation on Ubuntu 24.04
# Container runtime: containerd
# CNI: Calico
# Topology: 1 control-plane (node1) + 3 workers (node2-4)
# ============================================================================

# ============================================================================
# PHASE 1: Prerequisites — รันทุก node ใน cluster
# ============================================================================
- name: "Phase 1 — Prepare all nodes (kernel, sysctl, containerd, k8s tools)"
  hosts: cluster
  become: true
  vars:
    k8s_version: "1.31"           # Kubernetes minor version
    k8s_apt_version: "1.31.*-*"   # Pin apt package version
  tasks:

    # --- 1.1 Kernel modules -------------------------------------------------
    - name: "Ensure required kernel modules are loaded at boot"
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
        owner: root
        group: root
        mode: '0644'

    - name: "Load kernel modules now (no reboot needed)"
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    # --- 1.2 sysctl params --------------------------------------------------
    - name: "Set sysctl params for Kubernetes networking"
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1
        owner: root
        group: root
        mode: '0644'

    - name: "Apply sysctl params"
      command: sysctl --system
      changed_when: false

    # --- 1.3 Verify swap is off (idempotent safety net) ---------------------
    - name: "Disable swap (runtime)"
      command: swapoff -a
      when: ansible_swaptotal_mb | int > 0
      changed_when: ansible_swaptotal_mb | int > 0

    - name: "Comment out swap entries in /etc/fstab (persist across reboots)"
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'

    # --- 1.4 Install containerd from Docker repo ----------------------------
    - name: "Install prerequisite packages & conntrack (required by kube-proxy)"
      apt:
        name:
          - conntrack
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - software-properties-common
        state: present
        update_cache: yes

    - name: "Create keyrings directory"
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: "Add Docker GPG key (for containerd package)"
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'
        force: true

    - name: "Add Docker apt repository"
      apt_repository:
        repo: "deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present
        update_cache: yes

    - name: "Install containerd.io"
      apt:
        name: containerd.io
        state: present

    - name: "Ensure /etc/containerd exists"
      file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: "Generate default containerd config"
      shell: containerd config default > /etc/containerd/config.toml
      #args:
      #  creates: /etc/containerd/config.toml
      changed_when: false
      notify: Restart containerd

    # บน Ubuntu 24.04 ใช้ systemd เป็น init → kubelet ใช้ systemd cgroup driver
    # containerd ต้องตั้ง SystemdCgroup = true เพื่อให้ตรงกัน ไม่งั้น kubelet จะไม่ start
    - name: "Set SystemdCgroup = true in containerd config"
      lineinfile:
        path: /etc/containerd/config.toml
        regexp: '^(\s*)SystemdCgroup\s*=\s*false'
        line: '            SystemdCgroup = true'
        backrefs: no
      notify: Restart containerd

    - name: "Enable and start containerd"
      systemd:
        name: containerd
        enabled: yes
        state: started
        daemon_reload: yes

    # --- 1.5 Install kubeadm, kubelet, kubectl ------------------------------
    - name: "Add Kubernetes apt GPG key (pkgs.k8s.io)"
      get_url:
        url: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key"
        dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
        mode: '0644'
        force: true

    - name: "Add Kubernetes apt repository"
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/ /"
        filename: kubernetes
        state: present
        update_cache: yes

    - name: "Install kubelet, kubeadm, kubectl (version-pinned)"
      apt:
        name:
          - "kubelet={{ k8s_apt_version }}"
          - "kubeadm={{ k8s_apt_version }}"
          - "kubectl={{ k8s_apt_version }}"
        state: present
        update_cache: yes

    - name: "Hold k8s packages (block automatic upgrades)"
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

    - name: "Enable kubelet (will fail-loop until kubeadm init/join — normal)"
      systemd:
        name: kubelet
        enabled: yes

  handlers:
    - name: Restart containerd
      systemd:
        name: containerd
        state: restarted
        daemon_reload: yes


# ============================================================================
# PHASE 2: Initialize control plane — เฉพาะ node1
# ============================================================================
- name: "Phase 2 — Initialize control plane on node1"
  hosts: control_plane
  become: true
  vars:
    pod_network_cidr: "192.168.0.0/16"   # Default ของ Calico
    apiserver_advertise_address: "{{ ansible_host }}"
  tasks:

    - name: "Run kubeadm init (idempotent — skips if already initialized)"
      command: >
        kubeadm init
        --apiserver-advertise-address={{ apiserver_advertise_address }}
        --pod-network-cidr={{ pod_network_cidr }}
        --cri-socket=unix:///var/run/containerd/containerd.sock
      args:
        creates: /etc/kubernetes/admin.conf
      register: kubeadm_init

    - name: "Create .kube directory for ansible_user"
      file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: "Copy admin.conf to user's kubeconfig"
      copy:
        src: /etc/kubernetes/admin.conf
        dest: "/home/{{ ansible_user }}/.kube/config"
        remote_src: yes
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'

    # --- Install Calico CNI -------------------------------------------------
    # ใช้ Tigera operator + Installation CR เป็นวิธี official ของ Calico ปัจจุบัน
    # ถ้าใช้ manifest แบบเก่า (calico.yaml) จะ deprecated แล้ว
    - name: "Check if Calico operator already installed"
      command: kubectl get ns tigera-operator
      become_user: "{{ ansible_user }}"
      environment:
        KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"
      register: calico_ns_check
      failed_when: false
      changed_when: false

    - name: "Install Calico Tigera operator"
      command: >
        kubectl create -f
        https://raw.githubusercontent.com/projectcalico/calico/v3.28.2/manifests/tigera-operator.yaml
      become_user: "{{ ansible_user }}"
      environment:
        KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"
      when: calico_ns_check.rc != 0

    - name: "Wait for tigera-operator deployment to be available"
      command: >
        kubectl wait --for=condition=Available deployment/tigera-operator
        -n tigera-operator --timeout=180s
      become_user: "{{ ansible_user }}"
      environment:
        KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"
      changed_when: false
      when: calico_ns_check.rc != 0

    - name: "Create Calico Installation custom resource"
      copy:
        dest: /tmp/calico-installation.yaml
        content: |
          apiVersion: operator.tigera.io/v1
          kind: Installation
          metadata:
            name: default
          spec:
            calicoNetwork:
              ipPools:
                - blockSize: 26
                  cidr: {{ pod_network_cidr }}
                  encapsulation: VXLANCrossSubnet
                  natOutgoing: Enabled
                  nodeSelector: all()
          ---
          apiVersion: operator.tigera.io/v1
          kind: APIServer
          metadata:
            name: default
          spec: {}
        mode: '0644'

    - name: "Apply Calico Installation CR"
      command: kubectl apply -f /tmp/calico-installation.yaml
      become_user: "{{ ansible_user }}"
      environment:
        KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"
      changed_when: false

    # --- Generate join command for workers ----------------------------------
    - name: "Generate kubeadm join command"
      command: kubeadm token create --print-join-command
      register: kubeadm_join_cmd
      changed_when: false

    - name: "Stash join command for the next play"
      set_fact:
        join_command: "{{ kubeadm_join_cmd.stdout }}"


# ============================================================================
# PHASE 3: Join workers — node2, node3, node4
# ============================================================================
- name: "Phase 3 — Join workers to the cluster"
  hosts: workers
  become: true
  tasks:

    - name: "Run kubeadm join (idempotent via creates)"
      command: "{{ hostvars[groups['control_plane'][0]]['join_command'] }} --cri-socket=unix:///var/run/containerd/containerd.sock"
      args:
        creates: /etc/kubernetes/kubelet.conf


# ============================================================================
# PHASE 4: Verify
# ============================================================================
- name: "Phase 4 — Verify cluster health"
  hosts: control_plane
  become: true
  tasks:

    - name: "Wait for all nodes to be Ready (up to 5 min while Calico settles)"
      command: kubectl wait --for=condition=Ready nodes --all --timeout=300s
      become_user: "{{ ansible_user }}"
      environment:
        KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"
      changed_when: false

    - name: "Show node status"
      command: kubectl get nodes -o wide
      become_user: "{{ ansible_user }}"
      environment:
        KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"
      register: nodes_out
      changed_when: false

    - name: "Show system pods"
      command: kubectl get pods -A
      become_user: "{{ ansible_user }}"
      environment:
        KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"
      register: pods_out
      changed_when: false

    - name: "Display cluster status"
      debug:
        msg: |
          ===== NODES =====
          {{ nodes_out.stdout }}

          ===== PODS =====
          {{ pods_out.stdout }}