---
- name: Configure Docker daemon to listen on TCP
  hosts: cluster
  become: true

  tasks:
    - name: Ensure /etc/docker directory exists
      file:
        path: /etc/docker
        state: directory
        mode: '0755'

    - name: Ensure docker.service.d directory exists
      file:
        path: /etc/systemd/system/docker.service.d
        state: directory
        mode: '0755'

    - name: Write daemon.json
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "hosts": ["unix:///var/run/docker.sock", "tcp://0.0.0.0:2375"]
          }
        mode: '0644'
      notify:
        - reload systemd
        - restart docker

    - name: Override systemd docker.service to remove conflicting -H flag
      copy:
        dest: /etc/systemd/system/docker.service.d/override.conf
        content: |
          [Service]
          ExecStart=
          ExecStart=/usr/bin/dockerd
        mode: '0644'
      notify:
        - reload systemd
        - restart docker

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: true

    - name: restart docker
      systemd:
        name: docker
        state: restarted