apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jenkins-role
rules:
- apiGroups: ["", "apps"]
  resources: ["deployments", "services", "secrets", "persistentvolumes", "persistentvolumeclaims", "pods"]
  verbs: ["get", "list", "create", "update", "patch", "delete", "apply"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jenkins-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: jenkins-role
subjects:
- kind: ServiceAccount
  name: default
  namespace: default